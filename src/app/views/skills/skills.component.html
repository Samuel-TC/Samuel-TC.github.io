<div id="skills" class="skills" [@scrollAnimation]="state">

    <h3 class="title-seccion">TECHNICAL SKILLS</h3>
    <div class="container">

        <!-- Frontend -->
        <div class="skill-group">
            <div class="skill-group-header">
                <i class="bi bi-display"></i>
                <span>Frontend</span>
            </div>
            <div class="skill-pills">
                <div class="skill-pill">
                    <img src="../assets/angular.svg" class="pill-img">
                    <span>Angular</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-filetype-tsx pill-icon"></i>
                    <span>React</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/html5.svg" class="pill-img">
                    <span>HTML5</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/css3.svg" class="pill-img">
                    <span>CSS3</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/sass.svg" class="pill-img">
                    <span>Sass</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/javascript.svg" class="pill-img">
                    <span>JavaScript</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-braces pill-icon"></i>
                    <span>TypeScript</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-bootstrap pill-icon"></i>
                    <span>Bootstrap</span>
                </div>
            </div>
        </div>

        <!-- Backend -->
        <div class="skill-group">
            <div class="skill-group-header">
                <i class="bi bi-server"></i>
                <span>Backend</span>
            </div>
            <div class="skill-pills">
                <div class="skill-pill">
                    <img src="../assets/node-js.svg" class="pill-img">
                    <span>Node.js</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-window-stack pill-icon"></i>
                    <span>.NET Core</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/spring.svg" class="pill-img">
                    <span>Spring Boot</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/java.svg" class="pill-img">
                    <span>Java</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/python.svg" class="pill-img">
                    <span>Python</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/php.svg" class="pill-img">
                    <span>PHP</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-code-slash pill-icon"></i>
                    <span>C#</span>
                </div>
            </div>
        </div>

        <!-- Databases & Cloud -->
        <div class="skill-group">
            <div class="skill-group-header">
                <i class="bi bi-database"></i>
                <span>Databases &amp; Cloud</span>
            </div>
            <div class="skill-pills">
                <div class="skill-pill">
                    <img src="../assets/mysql.svg" class="pill-img">
                    <span>MySQL</span>
                </div>
                <div class="skill-pill">
                    <img src="../assets/microsoftsqlserver.svg" class="pill-img">
                    <span>SQL Server</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-cloud-fill pill-icon" style="color:#FF9900"></i>
                    <span>AWS</span>
                </div>
                <div class="skill-pill">
                    <i class="bi bi-diagram-3 pill-icon"></i>
                    <span>Entity Framework</span>
                </div>
            </div>
        </div>

    </div>
</div>
