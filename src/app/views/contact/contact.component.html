<div name="contact" class="contact" [@scrollAnimationContact]="state">

        <!-- Info chips -->
        <div class="row justify-content-center g-3 mb-5">
            <div class="col-auto">
                <div class="contact-chip">
                    <i class="bi bi-envelope-fill"></i>
                    <a href="mailto:samueltc39.st@gmail.com">samueltc39.st@gmail.com</a>
                </div>
            </div>
            <div class="col-auto">
                <div class="contact-chip">
                    <i class="bi bi-telephone-fill"></i>
